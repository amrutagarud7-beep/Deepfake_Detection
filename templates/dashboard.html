<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Detection Dashboard</title>
  <link rel="stylesheet" href="/static/css/navbar.css">
  <!-- Optional: You can include Google Fonts if you want Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet" />
</head>
<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    position: relative;
    z-index: 1;
}

/* Push content below navbar */
.container {
    margin-top: 70px;  /* 🔥 IMPORTANT (navbar height space) */
}
/* Dark overlay + background image */
body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: 
        linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
        url("https://www.mccormick.northwestern.edu/images/news/2024/07/deepfake-detection-system-is-now-live-header.jpg");
    background-size: cover;
    background-position: center;
    z-index: -1;
}

/* Container */
.container {
    max-width: 1100px;
    width: 90%;
    padding: 40px 20px;
    text-align: center;
    color: white;
}
.content{
    text-align: center;
}
/* Title */
.title {
    margin-bottom: 40px;
    font-weight: 600;
    font-size: 2.5rem;
}

/* Cards Layout */
.cards {
    padding-left: 120px;
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

/* Card Base */
.card {
    width: 300px;
    height: 150px;
    border-radius: 15px;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    
    /* Glass effect */
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);

    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: default;
}

/* Hover Effect */
.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 15px 40px rgba(0,0,0,0.35);
}

/* Text */
.card h2 {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 600;
}

.card p {
    font-size: 2rem;
    font-weight: 700;
    margin-top: 10px;
}

/* Color Accents */
.blue {
   background-color: transparent ;
}

.red {
    background-color:transparent;
}

.green {
    background-color:transparent;
}
.blue,.red,.green{
    border: 2px solid white;
}
/* Responsive (stack cards on narrow screens) */
@media (max-width: 960px) {
    .cards {
        flex-direction: column;
        gap: 20px;
        align-items: center;
    }
}</style>
<body>
 {% include "navbar.html" %}
  <div class="container">
    <div class="content">
    <h1 class="title">AI Detection Dashboard</h1>

    <div class="cards">
      <div class="card blue">
        <h2>Total Scans</h2>
        <p>10</p>
      </div>

      <div class="card red">
        <h2>Fake Detected</h2>
        <p>6</p>
      </div>

      <div class="card green">
        <h2>Real Detected</h2>
        <p>3</p>
      </div>
    </div>
  </div>

</body>
</html>
