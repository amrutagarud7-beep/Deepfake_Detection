<!DOCTYPE html>
<html>

<head>
<title>Detection Result</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

.result-container{
width:500px;
margin:40px auto;
text-align:center;
background:#f5f5f5;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.result-img{
margin:20px 0;
border-radius:10px;
}

.bar{
width:100%;
background:#ddd;
border-radius:20px;
margin:15px 0;
overflow:hidden;
}

.fake{
background:#ff4d4d;
color:white;
padding:8px;
text-align:center;
}

.real{
background:#28a745;
color:white;
padding:8px;
text-align:center;
}

.btn{
margin-top:20px;
padding:10px 20px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.btn:hover{
background:#0056b3;
}

</style>

</head>

<body>

{% include "navbar.html" %}

<div class="result-container">

<h1>Detection Result</h1>

{% if image %}
<img class="result-img"
src="{{ url_for('static', filename='uploads/' + image) }}"
width="300">
{% endif %}

<h2>{{ result }}</h2>

<!-- Fake Percentage -->
<div class="bar">
<div class="fake" style="width: {{ fake }}%">
Fake {{ fake }}%
</div>
</div>

<!-- Real Percentage -->
<div class="bar">
<div class="real" style="width: {{ real }}%">
Real {{ real }}%
</div>
</div>

<a href="/detect_image">
<button class="btn">Detect Another Image</button>
</a>

</div>

</body>
</html>
